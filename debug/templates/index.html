<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Debug — Bảng O2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- ====== HEADER ====== -->
    <header>
        <h1>Robot Debug — Bảng O2</h1>
        <div class="header-status">
            <span id="status-hw" class="badge badge-wait">Đang kết nối...</span>
            <span id="status-cam" class="badge badge-off">Camera</span>
            <span id="status-model" class="badge badge-off">HSV Color</span>
        </div>
    </header>

    <!-- ====== MAIN GRID ====== -->
    <main>
        <!-- ---- CỘT TRÁI: Điều khiển di chuyển ---- -->
        <section class="panel" id="panel-move">
            <h2>Di chuyển</h2>

            <div class="speed-control">
                <label for="speed-slider">Tốc độ: <strong id="speed-value">{{ config.SPEED_DEFAULT }}</strong>%</label>
                <input type="range" id="speed-slider" min="10" max="100" value="{{ config.SPEED_DEFAULT }}">
            </div>

            <div class="dpad">
                <button class="btn-move" data-action="forward" id="btn-fwd">&#9650;<br><small>Tiến</small></button>
                <button class="btn-move" data-action="left" id="btn-left">&#9664;<br><small>Trái</small></button>
                <button class="btn-move btn-stop" data-action="stop" id="btn-stop">&#9632;<br><small>Dừng</small></button>
                <button class="btn-move" data-action="right" id="btn-right">&#9654;<br><small>Phải</small></button>
                <button class="btn-move" data-action="backward" id="btn-back">&#9660;<br><small>Lùi</small></button>
            </div>

            <p class="hint">Nhấn giữ để di chuyển, thả ra để dừng.<br>
               Hoặc dùng phím <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>&#8593;</kbd><kbd>&#8595;</kbd><kbd>&#8592;</kbd><kbd>&#8594;</kbd></p>
        </section>

        <!-- ---- CỘT GIỮA: Camera ---- -->
        <section class="panel" id="panel-camera">
            <h2>Camera AI</h2>

            <div class="camera-container">
                <img id="camera-feed" src="/api/camera/stream" alt="Camera stream">
            </div>

            <div class="vision-controls">
                <button id="btn-classify" class="btn-action">Nhận diện kiện hàng</button>
            </div>

            <div id="vision-result" class="result-box hidden">
                <div class="result-label">
                    <span id="result-label-text">—</span>
                    <span id="result-confidence" class="confidence">0%</span>
                </div>
                <div id="result-factory" class="result-factory">—</div>
            </div>
        </section>

        <!-- ---- CỘT PHẢI: Nâng/hạ + Cảm biến ---- -->
        <section class="panel" id="panel-right">
            <!-- Nâng/hạ -->
            <div class="sub-panel">
                <h2>Cơ cấu nâng</h2>
                <div class="lift-display">
                    <div class="lift-indicator">
                        <div class="lift-bar" id="lift-bar"></div>
                    </div>
                    <span class="lift-level">Tầng: <strong id="lift-level-text">0</strong></span>
                </div>
                <div class="lift-buttons">
                    <button class="btn-lift" data-action="up">&#9650; Nâng</button>
                    <button class="btn-lift" data-action="down">&#9660; Hạ</button>
                    <button class="btn-lift" data-action="pickup" data-shelf="1">Nhấc (T1)</button>
                    <button class="btn-lift" data-action="pickup" data-shelf="2">Nhấc (T2)</button>
                    <button class="btn-lift" data-action="dropoff">Đặt hàng</button>
                    <button class="btn-lift btn-reset" data-action="reset">Reset</button>
                </div>
            </div>

            <!-- Cảm biến dò line -->
            <div class="sub-panel">
                <h2>Cảm biến dò line</h2>
                <div class="line-sensor-display" id="line-sensor-display">
                    <div class="sensor-dot" data-idx="0"></div>
                    <div class="sensor-dot" data-idx="1"></div>
                    <div class="sensor-dot" data-idx="2"></div>
                    <div class="sensor-dot" data-idx="3"></div>
                    <div class="sensor-dot" data-idx="4"></div>
                    <div class="sensor-dot" data-idx="5"></div>
                    <div class="sensor-dot" data-idx="6"></div>
                    <div class="sensor-dot" data-idx="7"></div>
                </div>
                <div class="sensor-info">
                    <span>Lệch: <strong id="sensor-error">0.00</strong></span>
                    <span>Active: <strong id="sensor-active">0</strong>/8</span>
                    <span id="sensor-intersection" class="badge badge-off">Giao lộ</span>
                </div>
            </div>
        </section>
    </main>

    <!-- ====== LOG ====== -->
    <footer>
        <div class="log-container">
            <h3>Log <button id="btn-clear-log" class="btn-small">Xoá</button></h3>
            <div id="log-output"></div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
